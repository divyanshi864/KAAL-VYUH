{% extends "base.html" %}
{% block content %}

<h2 style="color:white;">Real-Time Orbital Simulation</h2>
<div id="earth-container" style="width:100%; height:800px;"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function(){

    const container = document.getElementById("earth-container");

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(
        60,
        container.clientWidth / container.clientHeight,
        0.1,
        5000
    );

    camera.position.set(0, 0, 25);

    const renderer = new THREE.WebGLRenderer({ antialias:true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);

    // 🌟 STAR BACKGROUND
    const starsGeometry = new THREE.BufferGeometry();
    const starCount = 10000;
    const starVertices = [];

    for(let i=0; i<starCount; i++){
        const x = (Math.random() - 0.5) * 2000;
        const y = (Math.random() - 0.5) * 2000;
        const z = (Math.random() - 0.5) * 2000;
        starVertices.push(x,y,z);
    }

    starsGeometry.setAttribute(
        'position',
        new THREE.Float32BufferAttribute(starVertices,3)
    );

    const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff });
    const starField = new THREE.Points(starsGeometry, starsMaterial);
    scene.add(starField);

    // ☀️ Lighting
    const sunLight = new THREE.DirectionalLight(0xffffff, 1.5);
    sunLight.position.set(50, 0, 50);
    scene.add(sunLight);

    scene.add(new THREE.AmbientLight(0x222222));

    const textureLoader = new THREE.TextureLoader();

    // 🌍 EARTH TEXTURES
    const earthTexture = textureLoader.load(
        "https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg"
    );

    const bumpTexture = textureLoader.load(
        "https://threejs.org/examples/textures/planets/earth_bump_2048.jpg"
    );

    const specTexture = textureLoader.load(
        "https://threejs.org/examples/textures/planets/earth_specular_2048.jpg"
    );

    const geometry = new THREE.SphereGeometry(8, 128, 128);

    const material = new THREE.MeshPhongMaterial({
        map: earthTexture,
        bumpMap: bumpTexture,
        bumpScale: 0.3,
        specularMap: specTexture,
        specular: new THREE.Color('grey')
    });

    const earth = new THREE.Mesh(geometry, material);
    scene.add(earth);

    // 🌫 Subtle Atmosphere
    const atmosphereGeometry = new THREE.SphereGeometry(8.1, 128, 128);
    const atmosphereMaterial = new THREE.MeshPhongMaterial({
        color: 0x3399ff,
        transparent: true,
        opacity: 0.05
    });

    const atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
    scene.add(atmosphere);

    // 🛰 Orbital Objects Group
    const orbitalObjects = [];

    function createOrbitalObject(radius, size, color, speed){
        const geometry = new THREE.SphereGeometry(size, 8, 8);
        const material = new THREE.MeshBasicMaterial({ color: color });
        const mesh = new THREE.Mesh(geometry, material);

        const angle = Math.random() * Math.PI * 2;

        orbitalObjects.push({
            mesh: mesh,
            radius: radius,
            angle: angle,
            speed: speed,
            inclination: (Math.random() - 0.5) * 0.5
        });

        scene.add(mesh);
    }

    // Small debris
    for(let i=0;i<200;i++){
        createOrbitalObject(
            10 + Math.random()*5,
            0.08,
            0x00ffff,
            0.002 + Math.random()*0.002
        );
    }

    // Larger satellites
    for(let i=0;i<20;i++){
        createOrbitalObject(
            11 + Math.random()*6,
            0.18,
            0xffffff,
            0.001 + Math.random()*0.001
        );
    }

    function animate(){
        requestAnimationFrame(animate);

        // Earth rotation
        earth.rotation.y += 0.001;
        atmosphere.rotation.y += 0.001;

        // Orbit motion
        orbitalObjects.forEach(obj => {
            obj.angle += obj.speed;

            const x = obj.radius * Math.cos(obj.angle);
            const z = obj.radius * Math.sin(obj.angle);
            const y = obj.radius * Math.sin(obj.inclination) * Math.sin(obj.angle);

            obj.mesh.position.set(x,y,z);
        });

        renderer.render(scene, camera);
    }

    animate();

    window.addEventListener("resize", function(){
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    });

});
</script>

{% endblock %}x
